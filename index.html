    for (var r = 0; r < size; r++) {

        var onEdge = r < 3 && c < 3 || r < 3 && c > size - 4 || r > size - 4 && c < 3;

        if (fill) cells.push(e("rect", { key: r + "-" + c, x: c * (100 / size), y: r * (100 / size), width: 100 / size, height: 100 / size, rx: 0.6 }));
      }
    }
    return e("svg", { viewBox: "0 0 100 100", className: "absolute inset-3 text-slate-800", fill: "currentColor" }, cells);

    if (step === "method") body = e(MethodStep, { onSelect: handleSelectMethod, amount: ctx.amount + (ctx.adminFee || 0) });

    else if (step === "va-detail") body = e(VADetailStep, { bank: bank, vaNumber: vaNumber, amount: ctx.amount + (ctx.adminFee || 0), onCopy: function (num) { handleCopy(num, "va-copy"); } });
    else if (step === "qris") body = e(QRISStep, { amount: ctx.amount + (ctx.adminFee || 0), secondsLeft: secondsLeft });
    else if (step === "teller") body = e(TellerStep, { amount: ctx.amount + (ctx.adminFee || 0), code: code });

    return e(SheetShell, { title: title, onBack: onBack, onClose: onClose, footer: footer }, body);
  }

  window.__BK__.PaymentFlow = PaymentFlow;
})();

/* ============================================================
   ROOT APP
   ============================================================ */
(function () {
  "use strict";
  var h = window.__BK__.helpers;
  var e = h.e, useState = h.useState, useEffect = h.useEffect, useRef = h.useRef, cn = h.classNames;
  var timeGreeting = h.timeGreeting;
  var BottomNav = window.__BK__.BottomNav;
  var TopHeader = window.__BK__.TopHeader;
  var HomeTab = window.__BK__.HomeTab;
  var TagihanTab = window.__BK__.TagihanTab;
  var SPPTab = window.__BK__.SPPTab;
  var RiwayatTab = window.__BK__.RiwayatTab;
  var PaymentFlow = window.__BK__.PaymentFlow;
  var ToastStack = window.__BK__.ui.ToastStack;

  var toastSeq = 0;

  function App() {
    var themeState = useState(function () {
      if (typeof window !== "undefined" && window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) return true;
      return false;
    });
    var dark = themeState[0], setDark = themeState[1];

    var tabState = useState("home");
    var activeTab = tabState[0], setActiveTab = tabState[1];

    var pendingServiceState = useState(null);
    var pendingService = pendingServiceState[0], setPendingService = pendingServiceState[1];

    var toastsState = useState([]);
    var toasts = toastsState[0], setToasts = toastsState[1];

    var historyState = useState([]);
    var history = historyState[0], setHistory = historyState[1];

    var paymentOpenState = useState(false);
    var paymentOpen = paymentOpenState[0], setPaymentOpen = paymentOpenState[1];
    var paymentCtxState = useState(null);
    var paymentCtx = paymentCtxState[0], setPaymentCtx = paymentCtxState[1];

    useEffect(function () {
      var root = document.documentElement;
      if (dark) root.classList.add("dark"); else root.classList.remove("dark");
    }, [dark]);

    function toast(message, type) {
      var id = "t" + (++toastSeq);
      setToasts(function (prev) { return prev.concat([{ id: id, message: message, type: type || "success" }]); });
      setTimeout(function () {
        setToasts(function (prev) { return prev.map(function (t) { return t.id === id ? Object.assign({}, t, { leaving: true }) : t; }); });
        setTimeout(function () {
          setToasts(function (prev) { return prev.filter(function (t) { return t.id !== id; }); });
        }, 220);
      }, 2400);
    }

    function handleQuickSelect(item) {
      setActiveTab(item.tab);
      if (item.service) setPendingService(item.service + ":" + Date.now());
    }

    function openPayment(ctx) {
      ctx.__key = Date.now() + "-" + Math.random();
      setPaymentCtx(ctx);
      setPaymentOpen(true);
    }

    function closePayment() {
      setPaymentOpen(false);
      setTimeout(function () { setPaymentCtx(null); }, 250);
    }

    function handlePaySuccess(record) {
      setHistory(function (prev) { return [record].concat(prev); });
      toast("Transaksi berhasil", "success");
    }

    function clearHistory() {
      setHistory([]);
      toast("Riwayat transaksi dihapus", "info");
    }

    var initialServiceKey = null;
    if (pendingService) initialServiceKey = pendingService.split(":")[0];

    var h_ = window.__BK__.helpers.e;

    return h_(
      "div",
      { id: "app-shell", className: "max-w-[480px] w-full mx-auto min-h-screen shadow-2xl overflow-x-hidden relative bg-[#EFF4F2] dark:bg-[#06100E] text-slate-800 dark:text-slate-100" },
      h_(ToastStack, { toasts: toasts }),
      h_(TopHeader, { dark: dark, onToggleTheme: function () { setDark(!dark); }, greeting: timeGreeting(), onBell: function () { toast("Belum ada notifikasi baru", "info"); } }),
      h_(
        "div",
        { className: "pb-24" },
        activeTab === "home" ? h_(HomeTab, { onQuickSelect: handleQuickSelect }) : null,
        activeTab === "tagihan" ? h_(TagihanTab, { onPay: openPayment, toast: toast, initialService: initialServiceKey }) : null,
        activeTab === "spp" ? h_(SPPTab, { onPay: openPayment, toast: toast }) : null,
        activeTab === "riwayat" ? h_(RiwayatTab, { history: history, onClear: clearHistory }) : null
      ),
      h_(BottomNav, { active: activeTab, onChange: function (id) { setActiveTab(id); setPendingService(null); } }),
      h_(PaymentFlow, { open: paymentOpen, ctx: paymentCtx, onClose: closePayment, onSuccess: handlePaySuccess, toast: toast })
    );
  }

  var root = ReactDOM.createRoot(document.getElementById("root"));
  root.render(React.createElement(App));
})();

</script>
</body>
